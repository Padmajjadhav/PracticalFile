<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Documents</title>
  <style>
    /* Minimal, clean UI */
    :root{
      --bg: #f7f8fb;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #0b63ff;
      --radius: 12px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    html,body{
      height:100%;
      margin:0;
      background:linear-gradient(180deg,var(--bg),#ffffff);
      color:#111827;
    }
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      box-sizing:border-box;
    }
    .card{
      width:100%;
      max-width:520px;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow: 0 6px 30px rgba(11,99,255,0.06);
      padding:28px;
    }
    header{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
    }
    .logo{
      width:46px;
      height:46px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--accent),#5aa0ff);
      color:white;
      border-radius:10px;
      flex:0 0 46px;
      font-weight:700;
      font-size:18px;
    }
    h1{
      font-size:18px;
      margin:0;
      letter-spacing: -0.2px;
    }
    p.lead{
      margin:8px 0 20px 0;
      color:var(--muted);
      font-size:13px;
    }
    .files{
      display:grid;
      gap:10px;
    }
    .file{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      border-radius:10px;
      background: #fbfdff;
      border:1px solid rgba(16,24,40,0.03);
    }
    .meta{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .icon{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border-radius:8px;
      font-weight:600;
      color:white;
      flex:0 0 40px;
    }
    .icon.pdf{ background: linear-gradient(180deg,#e63946,#ff7b83); }
    .icon.doc{ background: linear-gradient(180deg,#0b63ff,#4ea8ff); }
    .name{
      font-size:14px;
      margin:0;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
    }
    .actions a{
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      padding:8px 12px;
      border-radius:8px;
      border:1px solid transparent;
      background:transparent;
      color:var(--accent);
    }
    .actions a.download{
      background:transparent;
      border-color:rgba(11,99,255,0.08);
    }
    footer{
      margin-top:18px;
      font-size:12px;
      color:var(--muted);
    }

    /* small screens */
    @media (max-width:420px){
      .card{ padding:18px; }
      .logo{ width:40px; height:40px; font-size:16px; border-radius:8px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card" role="main">
      <header>
        <div class="logo" aria-hidden="true">DOC</div>
        <div>
          <h1>My Documents</h1>
          <p class="lead">Quick access to a Word document and a PDF. Click to open or download.</p>
        </div>
      </header>

      <section class="files" aria-label="Document links">
        <!-- PDF file -->
        <div class="file" role="article">
          <div class="meta">
            <div class="icon pdf" aria-hidden="true">PDF</div>
            <div>
              <p class="name">PDF File</p>
            </div>
          </div>
          <div class="actions">
            <!-- relative link to file in same repo -->
            <a href="./Practical.pdf" target="_blank" rel="noopener">Open</a>
            <a href="./Practical.docx" download class="download">Download</a>
          </div>
        </div>

        <!-- Word file -->
        <div class="file" role="article">
          <div class="meta">
            <div class="icon doc" aria-hidden="true">DOCX</div>
            <div>
              <p class="name">Word File 1</p>
            </div>
          </div>
          <div class="actions">
            <a href="./Practical.docx" target="_blank" rel="noopener">Open</a>
            <a href="./Practical.docx" download class="download">Download</a>
          </div>
        </div>

        <div class="file" role="article">
          <div class="meta">
            <div class="icon doc" aria-hidden="true">DOCX</div>
            <div>
              <p class="name">Word File 2</p>
            </div>
          </div>
          <div class="actions">
            <a href="./rohit.docx" target="_blank" rel="noopener">Open</a>
            <a href="./rohit.docx" download class="download">Download</a>
          </div>
        </div>
      </section>

      <footer>
       
      </footer>
    </main>
  </div>
</body>

</html>
